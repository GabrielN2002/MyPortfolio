<!DOCTYPE html>
<html>
  <head>
    <title>Fuel Check Calculator</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script type="module" crossorigin src="./assets/index-536QMH_R.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CIedRt8X.css">
  </head>
  <body>
    <div class="container d-flex justify-content-center">
      <div class="card my-5">
        <div class="card-body">
          <h1 class="card-title text-center pb-3">Fuel Check Calculator</h1>
          <div class="row">
            <div class="col-12">
              <form>
                <div class="form-floating mb-5">
                  <input class="form-control" inputmode="numeric" id="iFuel" placeholder="" />
                  <label for="iFuel">Initial Fuel</label>
                </div>

                <div class="form-floating mb-5">
                  <input class="form-control" inputmode="numeric" id="rFuel" placeholder="" />
                  <label for="rFuel">Remaining Fuel</label>
                </div>

                <button type="button" class="btn btn-dark" id="startBtn">Start Fuel Check</button>
                <button type="button" class="btn btn-dark" style="display: none" id="stopBtn">Stop Fuel Check</button> <br />

                <input id="interval" class="form-range" type="range" min="15" max="30" step="1" value="15" />
                <label class="form-text text-light" id="intervalSelector" for="interval">Interval: 15</label>
              </form>
            </div>
            <div class="container">
              <div id="results" class="col-12" style="display: none">
                <div class="list-group list-group-flush">
                  <div id="result1" class="list-group-item" style="display: none"><p id="startTime"></p></div>
                  <div id="result2" class="list-group-item" style="display: none"><p id="stopTime"></p></div>
                  <div id="result3" class="list-group-item" style="display: none"><p id="fuelBurn"></p></div>
                  <div id="result4" class="list-group-item" style="display: none"><p id="remTime"></p></div>
                  <div id="result5" class="list-group-item" style="display: none"><p id="boTime"></p></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
