<!DOCTYPE html>
<html lang="en">
  <head>
    <title>My Portfolio</title>
    <meta charset="utf-8" />
    <meta name="description" content="My digital portfolio" />
    <meta name="keywords" content="website, projects, student, portfolio" />
    <meta name="author" content="Gabriel A Nieves Ruiz" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" type="text/css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      integrity="sha256-9kPW/n5nn53j4WMRYAxe9c1rCY96Oogo/MKSVdKzPmI="
      crossorigin="anonymous"
    />

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div class="container-fluid">
      <header>
        <div class="p-3">
          <a class="text-decoration-none link-body-emphasis fs-3" href="/index.html"><i class="bi bi-box-arrow-left"></i> Exit</a>
        </div>
      </header>

      <div class="d-flex justify-content-center mt-4">
        <button id="btn" class="button">Press Me!</button>
      </div>

      <div class="d-flex justify-content-center m-5">
        <img id="gato" class="img-fluid rounded shadow" src="" />
      </div>
    </div>
    <script>
      document.getElementById("btn").addEventListener("click", toggle);

      let counter = 0;

      function toggle() {
        counter++;
        showHide();
      }

      function showHide() {
        if (counter == 1) {
          document.getElementById("gato").style = "display: block";
          document.getElementById("btn").innerHTML = "Gato!";
          document.getElementById("gato").src = "images/gato1.jpg";
        } else if (counter == 2) {
          document.getElementById("btn").innerHTML = "Gato!!";
          document.getElementById("gato").src = "images/gato2.jpg";
        } else if (counter == 3) {
          document.getElementById("btn").innerHTML = "Gato!!!";
          document.getElementById("gato").src = "images/gato3.jpg";
        } else if (counter == 4) {
          document.getElementById("btn").innerHTML = "👎💩";
          document.getElementById("gato").src = "images/luma.jpg";
        } else if (counter == 5) {
          document.getElementById("btn").innerHTML = "Press Me!";
          document.getElementById("gato").src = "";
          document.getElementById("gato").style = "display: none";
          counter = 0;
        }
      }
    </script>
  </body>
</html>
